version: '3.9'

services:

  # ── Main monitoring agent ──────────────────────────────────────────────────
  midas-monitor:
    build: .
    container_name: midas-ads-monitor
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      SCHEDULE_MODE: MORNING_PEAK        # 09:00 GST daily
      CHROMIUM_EXECUTABLE_PATH: ""       # uses bundled Playwright chromium
    volumes:
      - ./screenshots:/app/screenshots   # persist all captures
      - ./reports:/app/reports           # persist HTML reports
      - ./logs:/app/logs                 # persist logs
      - ./data:/app/data                 # persist DB
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "7"

  # ── Screenshot/report viewer (nginx static server) ────────────────────────
  viewer:
    image: nginx:1.25-alpine
    container_name: midas-viewer
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./screenshots:/usr/share/nginx/html/screenshots:ro
      - ./reports:/usr/share/nginx/html/reports:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - midas-monitor
